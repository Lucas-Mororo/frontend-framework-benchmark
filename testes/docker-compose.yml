version: '3.8'

services:
  firefox-test:
    build: .
    container_name: firefox_test_env
    volumes:
      - ./:/app
    environment:
      - DISPLAY=:99
    # Resource limitations
    deploy:
      resources:
        limits:
          cpus: '0.5' # Limits to 50% of one CPU core
          memory: 512m # Limits to 512MB of RAM
    # Network configuration
    networks:
      test-network:
        ipv4_address: 172.20.0.2

networks:
  test-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
